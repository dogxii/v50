name: 添加新文案

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

concurrency:
  group: add-copy
  cancel-in-progress: false

jobs:
  add-copy:
    if: github.event.label.name == 'approved'
    runs-on: ubuntu-latest
    steps:
      - name: Check if already processed
        id: check
        uses: actions/github-script@v9
        with:
          script: |
            const { data: issue } = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })

            if (issue.state === 'closed') {
              core.info('Issue already closed, skipping')
              core.setOutput('skip', 'true')
              return
            }

            core.setOutput('skip', 'false')

      - name: Extract copy from issue body
        if: steps.check.outputs.skip != 'true'
        id: extract
        uses: actions/github-script@v9
        with:
          script: |
            const body = context.payload.issue.body || ''
            const match = body.match(/### 文案内容\s*\n\s*([\s\S]*?)(?=\n###|$)/)

            if (!match || !match[1].trim()) {
              core.setFailed('无法从 Issue 中提取文案内容，请检查 Issue 格式')
              return
            }

            const copy = match[1].trim()
            core.setOutput('copy', copy)
            core.info(`Extracted copy: ${copy}`)

      - name: Checkout code
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v6

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Setup bun
        if: steps.check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: bun install --frozen-lockfile

      - name: Add copy
        if: steps.check.outputs.skip != 'true'
        env:
          COPY_TEXT: ${{ steps.extract.outputs.copy }}
        run: node ./scripts/add.ts

      - name: Check for changes
        if: steps.check.outputs.skip != 'true'
        id: changes
        run: |
          if git diff --quiet static/v50.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::文案重复，未产生变更"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.check.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add static/v50.json
          git commit -m "feat: add new copy from #${{ github.event.issue.number }}"
          git push

      - name: Comment and close (success)
        if: steps.check.outputs.skip != 'true' && steps.changes.outputs.changed == 'true'
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '✅ 您提交的文案已被添加到仓库中，感谢您的贡献！',
            })

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            })

      - name: Comment and close (duplicate)
        if: steps.check.outputs.skip != 'true' && steps.changes.outputs.changed == 'false'
        uses: actions/github-script@v9
        with:
          retries: 3
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '⚠️ 您提交的文案与已有文案重复，未被添加。感谢您的关注！',
            })

            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed',
            })
